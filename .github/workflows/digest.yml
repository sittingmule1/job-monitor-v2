name: Job Monitor Digest

on:
  schedule:
    - cron: "0 12 * * *"   # 8am ET / 12pm UTC daily — adjust as needed
  workflow_dispatch: {}     # lets you trigger a run manually from the Actions tab

permissions:
  contents: write

jobs:
  build-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run digest pipeline
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: python src/main.py

      - name: Commit updated digest + state
        run: |
          git config user.name "job-monitor-bot"
          git config user.email "actions@github.com"
          git add docs/index.html state/last_run.json state/seen_jobs.json
          git diff --quiet --cached || git commit -m "Update digest $(date -u +%Y-%m-%d)"
          git push
